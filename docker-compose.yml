services:
  hq-portal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hq-portal
    # Nginx reverse-proxies to this published port on the VPS; also used for
    # local testing.
    ports:
      - "8005:8000"
    env_file:
      - .env
    environment:
      # In production, fail fast instead of silently falling back to SQLite if
      # the database is unreachable (prevents accidental data loss).
      DB_REQUIRE: "true"
    # Join the shared network so this container can reach the central dotsai
    # Postgres by hostname, e.g. DATABASE_URL=...@postgres:5432/hq  (set in .env).
    networks:
      - dotsai_net
    restart: always

# The shared dotsai Postgres container already lives on this network, so we
# attach to it as external (this compose file does NOT create/own it).
# If the network name differs on your VPS, change it here to match
# (`docker network ls` shows the network the postgres container is on).
networks:
  dotsai_net:
    external: true
