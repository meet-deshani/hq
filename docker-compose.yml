services:
  hq-portal:
    build: .
    image: hq-portal:latest
    container_name: hq-portal
    # Nginx (on the shared services_services network) reverse-proxies to this
    # container by hostname on port 8000. The port stays container-internal —
    # it is NOT published to the host, so it can never collide with other apps.
    expose:
      - "8000"
    # App secrets / DB config, loaded only if the file exists. Marked optional so
    # a deploy succeeds before .env is provisioned (the app falls back to SQLite
    # when DATABASE_URL is unset). To move HQ onto the shared Postgres, drop a
    # /opt/apps/hq/.env on the VPS with:
    #   DATABASE_URL=postgresql://USER:PASS@postgres:5432/hq
    #   DB_REQUIRE=true
    env_file:
      - path: .env
        required: false
    restart: unless-stopped

# Shared VPS network: nginx and the central `postgres` container both live here,
# so hq-portal is reachable by nginx and can reach Postgres by hostname. This
# compose attaches to it as external — it does NOT create or own the network.
networks:
  default:
    name: services_services
    external: true
