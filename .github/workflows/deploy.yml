name: Deploy Z9S-AI HQ Portal

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Hostinger VPS
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 72.62.229.16 >> ~/.ssh/known_hosts

      - name: Trigger VPS Deploy Script
        run: |
          # Force-align the VPS checkout to origin/main BEFORE deploying so a
          # stale/locally-modified tracked file (e.g. docker-compose.yml written
          # by deploy.sh at init) can never abort deploy.sh's `git pull --ff-only`.
          # reset --hard only touches tracked files; untracked .env/.deploy.env
          # are preserved. This makes deploys self-healing against config drift.
          ssh -i ~/.ssh/id_rsa root@72.62.229.16 'git -C /opt/apps/hq fetch origin main && git -C /opt/apps/hq reset --hard origin/main && deploy hq'

