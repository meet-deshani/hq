document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).

    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n\n\n<script src=\"33cc10ab-eb14-491a-b1ef-a3b7a32dbf6f\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<style>/* ═══════════════════════════════════════════════════════════════\n   ZEROONE D·O·T·S AI — Design Tokens\n   Colors, typography, spacing, radii, shadows, motion\n   ═══════════════════════════════════════════════════════════════ */\n\n/* ── TYPE SYSTEM v4.0 · FOUR ROLES ────────────────────────────────────\n   1 · CHUBBO       → titles & display (H1–H4, hero, pull-quotes)\n   2 · SUPREME      → body & long-form reading copy\n   3 · SATOSHI      → UI / interface chrome (buttons, nav, inputs,\n                      table cells, badges, captions — the product layer)\n   4 · JETBRAINS    → data layer (numbers, code, timestamps) +\n                      uppercase eyebrows / labels\n   All four are self-hosted variable woff2. Everything else is RETIRED.\n   ─────────────────────────────────────────────────────────────────── */\n\n/* ── ROLE 1 · DISPLAY: Chubbo (chunky editorial slab — self-hosted variable) ──\n   Titles, H1–H4, hero, pull-quotes. Weight 700; native italics for accent. */\n@font-face { font-family:'Chubbo'; font-style:normal; font-weight:200 700; font-display:swap;\n  src:url(\"e929d16a-cc3b-4586-a30d-3a55811439c5\") format('woff2-variations'); }\n@font-face { font-family:'Chubbo'; font-style:italic; font-weight:200 700; font-display:swap;\n  src:url(\"94a5f61b-060d-4965-a10b-2c19e312185b\") format('woff2-variations'); }\n\n/* ── ROLE 2 · BODY: Supreme (clean neo-grotesque — self-hosted variable) ──\n   Long-form reading copy, leads, paragraphs. 400 body, 500 medium,\n   700 emphasis; native italics. */\n@font-face { font-family:'Supreme'; font-style:normal; font-weight:100 800; font-display:swap;\n  src:url(\"b9688901-bd1c-4cdb-a5f1-5ce45a41e22c\") format('woff2-variations'); }\n@font-face { font-family:'Supreme'; font-style:italic; font-weight:100 800; font-display:swap;\n  src:url(\"2fddcd3c-e672-483a-80a4-c829814c8c47\") format('woff2-variations'); }\n\n/* ── ROLE 3 · UI / INTERFACE: Satoshi (self-hosted variable woff2) ──\n   Buttons, nav, inputs, table cells, badges, captions, tabs. The dense\n   product-chrome voice — distinct from Supreme's editorial reading. */\n@font-face { font-family:'Satoshi'; font-style:normal; font-weight:300 900; font-display:swap;\n  src:url(\"271a769a-00c8-40e2-b7a5-fc09eb13acc3\") format('woff2-variations'); }\n@font-face { font-family:'Satoshi'; font-style:italic; font-weight:300 900; font-display:swap;\n  src:url(\"18df1587-36b5-4bcf-be4e-a6c4befd40d3\") format('woff2-variations'); }\n\n/* ── ROLE 4 · DATA / LABELS: JetBrains Mono (self-hosted variable woff2) ──\n   All numeric data, code, timestamps, hex codes + uppercase eyebrows. */\n@font-face { font-family:'JetBrains Mono'; font-style:normal; font-weight:100 800; font-display:swap;\n  src:url(\"0ee4bd90-a829-4a5f-9e48-6fc518c42cf8\") format('woff2-variations'); }\n@font-face { font-family:'JetBrains Mono'; font-style:italic; font-weight:100 800; font-display:swap;\n  src:url(\"e3d6327f-f56b-4fc7-8c2f-dd3d043f0a8b\") format('woff2-variations'); }\n\n:root {\n  /* ── D.O.T.S. Pillar Pastels (mapped to framework) ── */\n  --lavender: #C8B6FF;   /* D · Data */\n  --mint:     #B8E0D2;   /* O · Operations */\n  --peach:    #FFCDB2;   /* T · Tech */\n  --sky:      #A2D2FF;   /* S · Strategy */\n  --rose:     #FFB5C2;   /* Accent · Creative */\n  --lemon:    #FFF3B0;   /* Highlight */\n\n  /* Pillar aliases (semantic) */\n  --pillar-data:       var(--lavender);\n  --pillar-operations: var(--mint);\n  --pillar-tech:       var(--peach);\n  --pillar-strategy:   var(--sky);\n\n  /* ── Pillar tonal ladders — 5 steps per pillar, tint → base → shade ──\n     Use tints (20/40) for backgrounds + fills on light; use shades (80/95)\n     for text + icons on light. The base (60) is the identity pastel. */\n\n  /* Data · Lavender family */\n  --data-20:  #EDE6FF;   /* Very light tint — surface */\n  --data-40:  #D3C5FF;   /* Soft tint — fill */\n  --data-60:  #C8B6FF;   /* BASE — identity */\n  --data-80:  #5B3FD4;   /* Shade — text, icons, strokes */\n  --data-95:  #2D1B4E;   /* Deep — plum, italic, hero ink */\n\n  /* Operations · Mint family */\n  --ops-20:   #E5F3EC;\n  --ops-40:   #CCE9DC;\n  --ops-60:   #B8E0D2;   /* BASE */\n  --ops-80:   #1F7A5C;\n  --ops-95:   #0F3D2E;\n\n  /* Tech · Peach family */\n  --tech-20:  #FFEFE3;\n  --tech-40:  #FFDFC8;\n  --tech-60:  #FFCDB2;   /* BASE */\n  --tech-80:  #A8521A;\n  --tech-95:  #5C2A0D;\n\n  /* Strategy · Sky family */\n  --strat-20: #E5F1FF;\n  --strat-40: #C5E0FF;\n  --strat-60: #A2D2FF;   /* BASE */\n  --strat-80: #1E5B9C;\n  --strat-95: #0F2E4F;\n\n  /* ── Mid-value neutral anchors (warm + cool slate) ──\n     Bridge between cream surfaces and ink dark. Useful for filled panels,\n     nested cards, hero sub-sections that need depth without pure black. */\n  --slate-warm:  #3A3D4A;   /* Warm slate — cards on dark hero */\n  --slate-cool:  #27425D;   /* Cool slate — info panels, editorial */\n\n  /* ── Pillar \"deep\" variants — WCAG-safe for text + icons on light canvas ──\n     The pastels (above) are IDENTITY colors: use as dots, tint backgrounds,\n     borders, and pillar-accent strokes. They FAIL contrast as foreground.\n     The deep variants (below) are FUNCTIONAL colors: use for text, icon\n     strokes, and filled elements on cream/white. All pass AA at 14px+. */\n  --pillar-data-deep:       #5B3FD4;  /* Lavender → Deep violet */\n  --pillar-operations-deep: #1F7A5C;  /* Mint    → Deep green */\n  --pillar-tech-deep:       #A8521A;  /* Peach   → Burnt sienna */\n  --pillar-strategy-deep:   #1E5B9C;  /* Sky     → Deep blue */\n\n  /* ── Deep Anchors ── */\n  --ink:      #191924;   /* Primary text, dark BGs */\n  --plum:     #2D1B4E;   /* Hovers, premium */\n  --charcoal: #2A2A3C;   /* Footer, dark borders */\n\n  /* ── Warm Neutrals (Anthropic-style editorial) ── */\n  --cream-50:  #FDFCFA;\n  --cream-100: #F8F7F4;\n  --cream-150: #F2F0EC;\n  --sand-200:  #E8E6E0;\n  --sand-300:  #D4D1C9;\n  --stone-400: #B5B1A7;\n  --stone-500: #918D82;\n  --stone-600: #6E6B62;\n  --slate-700: #4A4842;\n  --slate-800: #2E2D29;\n\n  /* ── Sidebar (dark shell) ── */\n  --sidebar-bg:          #13131D;\n  --sidebar-hover:       #1E1E2E;\n  --sidebar-active:      #252538;\n  --sidebar-border:      #2A2A3C;\n  --sidebar-text:        #A8A6B0;\n  --sidebar-text-active: #FDFCFA;\n\n  /* ── Semantic ── */\n  --teal:        #4ECDC4;\n  --teal-hover:  #3DB8B0;\n  --amber:       #D4A574;\n  --gold:        #F5C542;\n  --danger:      #EF4444;\n  --success:     #10B981;\n\n  /* Foreground / Background aliases */\n  --bg:           var(--cream-50);\n  --bg-surface:   #FFFFFF;\n  --bg-elevated:  var(--cream-100);\n  --fg:           var(--ink);\n  --fg-muted:     var(--stone-600);\n  --fg-subtle:    var(--stone-500);\n  --border:       var(--sand-200);\n  --border-hover: var(--sand-300);\n\n  /* ── Brand Gradients ── */\n  --g-aurora: linear-gradient(135deg, #C8B6FF, #A2D2FF, #B8E0D2); /* @kind color */\n  --g-warmth: linear-gradient(135deg, #FFCDB2, #FFB5C2, #C8B6FF); /* @kind color */\n  --g-cosmos: linear-gradient(135deg, #191924, #2D1B4E); /* @kind color */\n\n  /* ── Typography — TYPE SYSTEM v4.0 (four roles) ──────────────────────\n     DISPLAY  = Chubbo — titles, H1–H4, hero, pull-quotes. Weight 700;\n       native italics in --plum for key-phrase emphasis.\n     BODY     = Supreme — long-form reading copy, leads, paragraphs.\n       400 body, 500 medium, 700 emphasis. Native italics.\n     UI       = Satoshi — interface chrome: buttons, nav, inputs, table\n       cells, badges, captions, tabs. The dense product layer.\n     DATA     = JetBrains Mono — numbers, code, timestamps, hex + the\n       uppercase eyebrow / label voice (letterspaced).\n     ──────────────────────────────────────────────────────────────────── */\n  --font-serif:   'Chubbo', Georgia, 'Times New Roman', serif;\n  --font-display: 'Chubbo', system-ui, sans-serif;\n  --font-body:    'Supreme', system-ui, -apple-system, sans-serif;\n  --font-ui:      'Satoshi', system-ui, -apple-system, sans-serif;\n  --font-mono:    'JetBrains Mono', ui-monospace, monospace;\n  --font-label:   'JetBrains Mono', ui-monospace, monospace;\n\n  /* ── Breakpoints (mobile-first) ── */\n  --bp-xs:  360px; /* @kind other */  /* Small phones (iPhone SE, older Android) */\n  --bp-sm:  480px; /* @kind other */  /* Large phones / phablet */\n  --bp-md:  768px; /* @kind other */  /* Tablet portrait */\n  --bp-lg:  1024px; /* @kind other */ /* Tablet landscape / small laptop */\n  --bp-xl:  1280px; /* @kind other */ /* Desktop */\n  --bp-2xl: 1536px; /* @kind other */ /* Wide desktop */\n\n  /* ── Touch targets (iOS HIG 44pt / Material 48dp) ── */\n  --touch-min:     44px; /* @kind spacing */  /* Minimum hit area — any tap target */\n  --touch-comfort: 48px; /* @kind spacing */  /* Comfort — primary CTAs, nav */\n  --touch-large:   56px; /* @kind spacing */  /* Hero CTAs, bottom-nav tabs */\n\n  /* ── Fluid type scale (mobile 360 → desktop 1280) ──\n     Fixed px tokens below REMAIN for desktop-only layouts; the fluid\n     tokens (*-fl) are mobile-safe and auto-scale. Use --fl-* on anything\n     that renders below 768px. */\n  --text-xs:   11px;\n  --text-sm:   13px;\n  --text-base: 15px;\n  --text-md:   17px;\n  --text-lg:   20px;\n  --text-xl:   28px;\n  --text-2xl:  36px;\n  --text-3xl:  52px;\n  --text-4xl:  76px;\n\n  /* Fluid (responsive) scale — use these on mobile+responsive surfaces */\n  --fl-xs:    clamp(10px, 0.7vw + 8px,  11px); /* @kind other */\n  --fl-sm:    clamp(12px, 0.4vw + 11px, 13px); /* @kind other */\n  --fl-base:  clamp(14px, 0.4vw + 13px, 16px); /* @kind other */\n  --fl-md:    clamp(15px, 0.6vw + 13px, 18px); /* @kind other */\n  --fl-lg:    clamp(17px, 0.8vw + 14px, 22px); /* @kind other */\n  --fl-xl:    clamp(22px, 2vw + 14px,   32px); /* @kind other */\n  --fl-2xl:   clamp(28px, 3vw + 14px,   44px); /* @kind other */\n  --fl-3xl:   clamp(34px, 4vw + 14px,   60px); /* @kind other */\n  --fl-4xl:   clamp(40px, 6vw + 14px,   84px); /* @kind other */\n\n  /* ── Spacing (8px grid) ── */\n  --sp-1:  4px;\n  --sp-2:  8px;\n  --sp-3:  12px;\n  --sp-4:  16px;\n  --sp-5:  20px;\n  --sp-6:  24px;\n  --sp-8:  32px;\n  --sp-10: 40px;\n  --sp-12: 48px;\n  --sp-16: 64px;\n  --sp-24: 96px;\n\n  /* ── Fluid spacing (mobile → desktop) ──\n     Use these for section padding, gaps, hero margins on responsive pages.\n     They collapse gracefully at 360px and open up at 1280px+. */\n  --sp-fl-xs:  clamp(4px,  0.4vw + 3px,  6px); /* @kind spacing */\n  --sp-fl-sm:  clamp(8px,  0.8vw + 5px,  12px); /* @kind spacing */\n  --sp-fl-md:  clamp(12px, 1vw + 8px,    20px); /* @kind spacing */\n  --sp-fl-lg:  clamp(16px, 2vw + 10px,   32px); /* @kind spacing */\n  --sp-fl-xl:  clamp(24px, 3vw + 12px,   48px); /* @kind spacing */\n  --sp-fl-2xl: clamp(32px, 4vw + 16px,   72px); /* @kind spacing */\n  --sp-fl-3xl: clamp(40px, 6vw + 20px,   112px); /* @kind spacing */\n\n  /* Section padding recipes — use on <section> wrappers */\n  --section-x: clamp(16px, 5vw, 80px); /* @kind spacing */       /* horizontal page gutter */\n  --section-y: clamp(48px, 7vw, 120px); /* @kind spacing */      /* vertical section rhythm */\n  --container-max: 1280px; /* @kind spacing */                   /* max content width */\n\n  /* ── Safe-area insets (iOS notch / home indicator / Android nav) ── */\n  --safe-top:    env(safe-area-inset-top, 0px); /* @kind spacing */\n  --safe-right:  env(safe-area-inset-right, 0px); /* @kind spacing */\n  --safe-bottom: env(safe-area-inset-bottom, 0px); /* @kind spacing */\n  --safe-left:   env(safe-area-inset-left, 0px); /* @kind spacing */\n\n  /* ── Radius ── */\n  --r-sm:   6px;\n  --r-md:   8px;\n  --r-lg:   12px;\n  --r-xl:   16px;\n  --r-2xl:  24px;\n  --r-full: 999px;\n\n  /* ── Shadows ── */\n  --shadow-sm:  0 1px 2px rgba(25,25,36,.04);\n  --shadow-md:  0 4px 12px rgba(25,25,36,.06);\n  --shadow-lg:  0 10px 32px rgba(25,25,36,.08);\n  --shadow-xl:  0 20px 50px rgba(25,25,36,.10);\n  --shadow-2xl: 0 30px 80px rgba(25,25,36,.14);\n  --shadow-focus: 0 0 0 4px rgba(200,182,255,.20);\n\n  /* ── Motion ── */\n  --ease-out:  cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n  --ease-snap: cubic-bezier(0.34, 1.56, 0.64, 1); /* @kind other */\n  --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --dur-fast: 150ms; /* @kind other */\n  --dur-med:  250ms; /* @kind other */\n  --dur-slow: 400ms; /* @kind other */\n}\n\n/* ═══════════════════════════════════════════════════════════════\n   SEMANTIC TYPOGRAPHY — drop-in element styles\n   ═══════════════════════════════════════════════════════════════ */\n\nbody {\n  font-family: var(--font-body);\n  font-size: var(--text-base);\n  line-height: 1.65;\n  color: var(--fg);\n  background: var(--bg);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n\n/* ── TYPE SYSTEM v4.0 · Semantic typography ────────────────────────────\n   H1 / .hero-text = Chubbo (display) at hero scale. Italic for emphasis\n     (native italic, coloured --plum).\n   H2–H4 = Chubbo — section headings. No forced uppercase; weight carries.\n   Body / p / .lead = Supreme — the reading layer.\n   UI chrome (buttons, nav, inputs) = Satoshi via --font-ui.\n   .eyebrow / .label / .data-value = JetBrains Mono — labels + data.\n   ──────────────────────────────────────────────────────────────────── */\n\n/* Hero / editorial display — Chubbo */\nh1, .h1, .hero-text {\n  font-family: var(--font-serif);\n  font-weight: 700;           /* Chubbo display — weight carries the authority */\n  font-size: clamp(40px, 6.5vw, var(--text-4xl));\n  line-height: 0.96;\n  letter-spacing: -0.02em;\n  color: var(--ink);\n}\nh1 em, .h1 em, .hero-text em {\n  font-style: italic;\n  color: var(--plum);         /* Chubbo has native italic — no swap needed */\n  letter-spacing: -0.03em;\n}\n\n/* Section headings — Chubbo */\nh2, .h2 {\n  font-family: var(--font-display);\n  font-weight: 800;\n  font-size: clamp(28px, 4.5vw, var(--text-3xl));\n  line-height: 1.05;\n  letter-spacing: -0.03em;\n  color: var(--ink);\n}\nh3, .h3 {\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: var(--text-xl);\n  line-height: 1.1;\n  letter-spacing: -0.02em;\n}\nh4, .h4 {\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: var(--text-md);\n  line-height: 1.3;\n  letter-spacing: -0.01em;\n}\n\n/* Italic accent on display headings → falls to body italic */\nh2 em, h3 em, h4 em, .display em {\n  font-family: var(--font-body);\n  font-style: italic;\n  font-weight: inherit;\n  letter-spacing: 0;\n  color: var(--plum);\n}\nem, .italic { font-style: italic; color: var(--plum); }\n\np, .body {\n  font-family: var(--font-body);\n  font-size: var(--text-base);\n  line-height: 1.75;\n  color: var(--fg-muted);\n}\n\n.lead {\n  font-size: var(--text-md);\n  line-height: 1.8;\n  color: var(--fg-muted);\n}\n\nsmall, .caption {\n  font-size: var(--text-sm);\n  color: var(--fg-subtle);\n}\n\n/* Mono labels / eyebrows / tags */\n.mono, code, kbd, pre {\n  font-family: var(--font-mono);\n}\n/* Eyebrow / section labels — JetBrains Mono */\n.eyebrow, .label-mono {\n  font-family: var(--font-label);\n  font-size: var(--text-xs);\n  letter-spacing: 3px;\n  text-transform: uppercase;\n  color: var(--stone-500);\n}\n/* Data values — JetBrains Mono */\n.data-value {\n  font-family: var(--font-mono);\n  font-weight: 700;\n  letter-spacing: -0.02em;\n  font-variant-numeric: tabular-nums;\n}\n/* Fluid heading utilities (Chubbo display) */\n.h1-fluid {\n  font-family: var(--font-serif);\n  font-weight: 400;\n  font-size: var(--fl-4xl);\n  line-height: 0.96;\n  letter-spacing: -0.025em;\n}\n.h2-fluid {\n  font-family: var(--font-display);\n  font-weight: 800;\n  font-size: var(--fl-3xl);\n  line-height: 1.05;\n  letter-spacing: -0.03em;\n}\n\n::selection { background: var(--lavender); color: var(--ink); }\n*:focus-visible { outline: 2px solid var(--lavender); outline-offset: 2px; }\n\n/* ═══════════════════════════════════════════════════════════════\n   MOBILE UTILITIES — responsive helpers\n   ═══════════════════════════════════════════════════════════════ */\n\n/* Page container — handles gutter + max width + safe-area */\n.container {\n  width: 100%;\n  max-width: var(--container-max);\n  margin: 0 auto;\n  padding-left: max(var(--section-x), var(--safe-left));\n  padding-right: max(var(--section-x), var(--safe-right));\n  box-sizing: border-box;\n}\n.section { padding-top: var(--section-y); padding-bottom: var(--section-y); }\n\n/* Touch-target enforcement */\n.tap    { min-height: var(--touch-min);     min-width: var(--touch-min);     }\n.tap-lg { min-height: var(--touch-comfort); min-width: var(--touch-comfort); }\n\n/* Safe-area helpers — bottom tab bars, modal sheets, etc. */\n.pb-safe { padding-bottom: calc(var(--sp-4) + var(--safe-bottom)); }\n.pt-safe { padding-top:    calc(var(--sp-4) + var(--safe-top)); }\n\n/* Show/hide by breakpoint */\n.mobile-only  { display: block; }\n.desktop-only { display: none;  }\n@media (min-width: 768px) {\n  .mobile-only  { display: none;  }\n  .desktop-only { display: block; }\n}\n\n/* Responsive hero + body — mobile defaults, desktop overrides */\n.h1-fluid { font-family: var(--font-display); font-weight: 700;\n  font-size: var(--fl-4xl); line-height: 1.02; letter-spacing: -0.015em; }\n.h2-fluid { font-family: var(--font-display); font-weight: 600;\n  font-size: var(--fl-3xl); line-height: 1.08; letter-spacing: -0.005em; }\n.body-fluid { font-size: var(--fl-base); line-height: 1.6; }\n\n/* Stack on mobile, row on desktop */\n.stack-to-row { display: flex; flex-direction: column; gap: var(--sp-fl-md); }\n@media (min-width: 768px) { .stack-to-row { flex-direction: row; } }\n<\u002Fstyle>\n<style>/* ═══════════════════════════════════════════════════════════════\n   ZEROONE D·O·T·S AI — Design System · ROOT ENTRY\n   Consumers link THIS one file. It pulls in all design tokens,\n   typography, and semantic element styles.\n   ═══════════════════════════════════════════════════════════════ */\n/* ═══════════════════════════════════════════════════════════════\n   ZEROONE D·O·T·S AI — Design Tokens\n   Colors, typography, spacing, radii, shadows, motion\n   ═══════════════════════════════════════════════════════════════ */\n\n/* ── TYPE SYSTEM v4.0 · FOUR ROLES ────────────────────────────────────\n   1 · CHUBBO       → titles & display (H1–H4, hero, pull-quotes)\n   2 · SUPREME      → body & long-form reading copy\n   3 · SATOSHI      → UI / interface chrome (buttons, nav, inputs,\n                      table cells, badges, captions — the product layer)\n   4 · JETBRAINS    → data layer (numbers, code, timestamps) +\n                      uppercase eyebrows / labels\n   All four are self-hosted variable woff2. Everything else is RETIRED.\n   ─────────────────────────────────────────────────────────────────── */\n\n/* ── ROLE 1 · DISPLAY: Chubbo (chunky editorial slab — self-hosted variable) ──\n   Titles, H1–H4, hero, pull-quotes. Weight 700; native italics for accent. */\n@font-face { font-family:'Chubbo'; font-style:normal; font-weight:200 700; font-display:swap;\n  src:url(\"e929d16a-cc3b-4586-a30d-3a55811439c5\") format('woff2-variations'); }\n@font-face { font-family:'Chubbo'; font-style:italic; font-weight:200 700; font-display:swap;\n  src:url(\"94a5f61b-060d-4965-a10b-2c19e312185b\") format('woff2-variations'); }\n\n/* ── ROLE 2 · BODY: Supreme (clean neo-grotesque — self-hosted variable) ──\n   Long-form reading copy, leads, paragraphs. 400 body, 500 medium,\n   700 emphasis; native italics. */\n@font-face { font-family:'Supreme'; font-style:normal; font-weight:100 800; font-display:swap;\n  src:url(\"b9688901-bd1c-4cdb-a5f1-5ce45a41e22c\") format('woff2-variations'); }\n@font-face { font-family:'Supreme'; font-style:italic; font-weight:100 800; font-display:swap;\n  src:url(\"2fddcd3c-e672-483a-80a4-c829814c8c47\") format('woff2-variations'); }\n\n/* ── ROLE 3 · UI / INTERFACE: Satoshi (self-hosted variable woff2) ──\n   Buttons, nav, inputs, table cells, badges, captions, tabs. The dense\n   product-chrome voice — distinct from Supreme's editorial reading. */\n@font-face { font-family:'Satoshi'; font-style:normal; font-weight:300 900; font-display:swap;\n  src:url(\"271a769a-00c8-40e2-b7a5-fc09eb13acc3\") format('woff2-variations'); }\n@font-face { font-family:'Satoshi'; font-style:italic; font-weight:300 900; font-display:swap;\n  src:url(\"18df1587-36b5-4bcf-be4e-a6c4befd40d3\") format('woff2-variations'); }\n\n/* ── ROLE 4 · DATA / LABELS: JetBrains Mono (self-hosted variable woff2) ──\n   All numeric data, code, timestamps, hex codes + uppercase eyebrows. */\n@font-face { font-family:'JetBrains Mono'; font-style:normal; font-weight:100 800; font-display:swap;\n  src:url(\"0ee4bd90-a829-4a5f-9e48-6fc518c42cf8\") format('woff2-variations'); }\n@font-face { font-family:'JetBrains Mono'; font-style:italic; font-weight:100 800; font-display:swap;\n  src:url(\"e3d6327f-f56b-4fc7-8c2f-dd3d043f0a8b\") format('woff2-variations'); }\n\n:root {\n  /* ── D.O.T.S. Pillar Pastels (mapped to framework) ── */\n  --lavender: #C8B6FF;   /* D · Data */\n  --mint:     #B8E0D2;   /* O · Operations */\n  --peach:    #FFCDB2;   /* T · Tech */\n  --sky:      #A2D2FF;   /* S · Strategy */\n  --rose:     #FFB5C2;   /* Accent · Creative */\n  --lemon:    #FFF3B0;   /* Highlight */\n\n  /* Pillar aliases (semantic) */\n  --pillar-data:       var(--lavender);\n  --pillar-operations: var(--mint);\n  --pillar-tech:       var(--peach);\n  --pillar-strategy:   var(--sky);\n\n  /* ── Pillar tonal ladders — 5 steps per pillar, tint → base → shade ──\n     Use tints (20/40) for backgrounds + fills on light; use shades (80/95)\n     for text + icons on light. The base (60) is the identity pastel. */\n\n  /* Data · Lavender family */\n  --data-20:  #EDE6FF;   /* Very light tint — surface */\n  --data-40:  #D3C5FF;   /* Soft tint — fill */\n  --data-60:  #C8B6FF;   /* BASE — identity */\n  --data-80:  #5B3FD4;   /* Shade — text, icons, strokes */\n  --data-95:  #2D1B4E;   /* Deep — plum, italic, hero ink */\n\n  /* Operations · Mint family */\n  --ops-20:   #E5F3EC;\n  --ops-40:   #CCE9DC;\n  --ops-60:   #B8E0D2;   /* BASE */\n  --ops-80:   #1F7A5C;\n  --ops-95:   #0F3D2E;\n\n  /* Tech · Peach family */\n  --tech-20:  #FFEFE3;\n  --tech-40:  #FFDFC8;\n  --tech-60:  #FFCDB2;   /* BASE */\n  --tech-80:  #A8521A;\n  --tech-95:  #5C2A0D;\n\n  /* Strategy · Sky family */\n  --strat-20: #E5F1FF;\n  --strat-40: #C5E0FF;\n  --strat-60: #A2D2FF;   /* BASE */\n  --strat-80: #1E5B9C;\n  --strat-95: #0F2E4F;\n\n  /* ── Mid-value neutral anchors (warm + cool slate) ──\n     Bridge between cream surfaces and ink dark. Useful for filled panels,\n     nested cards, hero sub-sections that need depth without pure black. */\n  --slate-warm:  #3A3D4A;   /* Warm slate — cards on dark hero */\n  --slate-cool:  #27425D;   /* Cool slate — info panels, editorial */\n\n  /* ── Pillar \"deep\" variants — WCAG-safe for text + icons on light canvas ──\n     The pastels (above) are IDENTITY colors: use as dots, tint backgrounds,\n     borders, and pillar-accent strokes. They FAIL contrast as foreground.\n     The deep variants (below) are FUNCTIONAL colors: use for text, icon\n     strokes, and filled elements on cream/white. All pass AA at 14px+. */\n  --pillar-data-deep:       #5B3FD4;  /* Lavender → Deep violet */\n  --pillar-operations-deep: #1F7A5C;  /* Mint    → Deep green */\n  --pillar-tech-deep:       #A8521A;  /* Peach   → Burnt sienna */\n  --pillar-strategy-deep:   #1E5B9C;  /* Sky     → Deep blue */\n\n  /* ── Deep Anchors ── */\n  --ink:      #191924;   /* Primary text, dark BGs */\n  --plum:     #2D1B4E;   /* Hovers, premium */\n  --charcoal: #2A2A3C;   /* Footer, dark borders */\n\n  /* ── Warm Neutrals (Anthropic-style editorial) ── */\n  --cream-50:  #FDFCFA;\n  --cream-100: #F8F7F4;\n  --cream-150: #F2F0EC;\n  --sand-200:  #E8E6E0;\n  --sand-300:  #D4D1C9;\n  --stone-400: #B5B1A7;\n  --stone-500: #918D82;\n  --stone-600: #6E6B62;\n  --slate-700: #4A4842;\n  --slate-800: #2E2D29;\n\n  /* ── Sidebar (dark shell) ── */\n  --sidebar-bg:          #13131D;\n  --sidebar-hover:       #1E1E2E;\n  --sidebar-active:      #252538;\n  --sidebar-border:      #2A2A3C;\n  --sidebar-text:        #A8A6B0;\n  --sidebar-text-active: #FDFCFA;\n\n  /* ── Semantic ── */\n  --teal:        #4ECDC4;\n  --teal-hover:  #3DB8B0;\n  --amber:       #D4A574;\n  --gold:        #F5C542;\n  --danger:      #EF4444;\n  --success:     #10B981;\n\n  /* Foreground / Background aliases */\n  --bg:           var(--cream-50);\n  --bg-surface:   #FFFFFF;\n  --bg-elevated:  var(--cream-100);\n  --fg:           var(--ink);\n  --fg-muted:     var(--stone-600);\n  --fg-subtle:    var(--stone-500);\n  --border:       var(--sand-200);\n  --border-hover: var(--sand-300);\n\n  /* ── Brand Gradients ── */\n  --g-aurora: linear-gradient(135deg, #C8B6FF, #A2D2FF, #B8E0D2); /* @kind color */\n  --g-warmth: linear-gradient(135deg, #FFCDB2, #FFB5C2, #C8B6FF); /* @kind color */\n  --g-cosmos: linear-gradient(135deg, #191924, #2D1B4E); /* @kind color */\n\n  /* ── Typography — TYPE SYSTEM v4.0 (four roles) ──────────────────────\n     DISPLAY  = Chubbo — titles, H1–H4, hero, pull-quotes. Weight 700;\n       native italics in --plum for key-phrase emphasis.\n     BODY     = Supreme — long-form reading copy, leads, paragraphs.\n       400 body, 500 medium, 700 emphasis. Native italics.\n     UI       = Satoshi — interface chrome: buttons, nav, inputs, table\n       cells, badges, captions, tabs. The dense product layer.\n     DATA     = JetBrains Mono — numbers, code, timestamps, hex + the\n       uppercase eyebrow / label voice (letterspaced).\n     ──────────────────────────────────────────────────────────────────── */\n  --font-serif:   'Chubbo', Georgia, 'Times New Roman', serif;\n  --font-display: 'Chubbo', system-ui, sans-serif;\n  --font-body:    'Supreme', system-ui, -apple-system, sans-serif;\n  --font-ui:      'Satoshi', system-ui, -apple-system, sans-serif;\n  --font-mono:    'JetBrains Mono', ui-monospace, monospace;\n  --font-label:   'JetBrains Mono', ui-monospace, monospace;\n\n  /* ── Breakpoints (mobile-first) ── */\n  --bp-xs:  360px; /* @kind other */  /* Small phones (iPhone SE, older Android) */\n  --bp-sm:  480px; /* @kind other */  /* Large phones / phablet */\n  --bp-md:  768px; /* @kind other */  /* Tablet portrait */\n  --bp-lg:  1024px; /* @kind other */ /* Tablet landscape / small laptop */\n  --bp-xl:  1280px; /* @kind other */ /* Desktop */\n  --bp-2xl: 1536px; /* @kind other */ /* Wide desktop */\n\n  /* ── Touch targets (iOS HIG 44pt / Material 48dp) ── */\n  --touch-min:     44px; /* @kind spacing */  /* Minimum hit area — any tap target */\n  --touch-comfort: 48px; /* @kind spacing */  /* Comfort — primary CTAs, nav */\n  --touch-large:   56px; /* @kind spacing */  /* Hero CTAs, bottom-nav tabs */\n\n  /* ── Fluid type scale (mobile 360 → desktop 1280) ──\n     Fixed px tokens below REMAIN for desktop-only layouts; the fluid\n     tokens (*-fl) are mobile-safe and auto-scale. Use --fl-* on anything\n     that renders below 768px. */\n  --text-xs:   11px;\n  --text-sm:   13px;\n  --text-base: 15px;\n  --text-md:   17px;\n  --text-lg:   20px;\n  --text-xl:   28px;\n  --text-2xl:  36px;\n  --text-3xl:  52px;\n  --text-4xl:  76px;\n\n  /* Fluid (responsive) scale — use these on mobile+responsive surfaces */\n  --fl-xs:    clamp(10px, 0.7vw + 8px,  11px); /* @kind other */\n  --fl-sm:    clamp(12px, 0.4vw + 11px, 13px); /* @kind other */\n  --fl-base:  clamp(14px, 0.4vw + 13px, 16px); /* @kind other */\n  --fl-md:    clamp(15px, 0.6vw + 13px, 18px); /* @kind other */\n  --fl-lg:    clamp(17px, 0.8vw + 14px, 22px); /* @kind other */\n  --fl-xl:    clamp(22px, 2vw + 14px,   32px); /* @kind other */\n  --fl-2xl:   clamp(28px, 3vw + 14px,   44px); /* @kind other */\n  --fl-3xl:   clamp(34px, 4vw + 14px,   60px); /* @kind other */\n  --fl-4xl:   clamp(40px, 6vw + 14px,   84px); /* @kind other */\n\n  /* ── Spacing (8px grid) ── */\n  --sp-1:  4px;\n  --sp-2:  8px;\n  --sp-3:  12px;\n  --sp-4:  16px;\n  --sp-5:  20px;\n  --sp-6:  24px;\n  --sp-8:  32px;\n  --sp-10: 40px;\n  --sp-12: 48px;\n  --sp-16: 64px;\n  --sp-24: 96px;\n\n  /* ── Fluid spacing (mobile → desktop) ──\n     Use these for section padding, gaps, hero margins on responsive pages.\n     They collapse gracefully at 360px and open up at 1280px+. */\n  --sp-fl-xs:  clamp(4px,  0.4vw + 3px,  6px); /* @kind spacing */\n  --sp-fl-sm:  clamp(8px,  0.8vw + 5px,  12px); /* @kind spacing */\n  --sp-fl-md:  clamp(12px, 1vw + 8px,    20px); /* @kind spacing */\n  --sp-fl-lg:  clamp(16px, 2vw + 10px,   32px); /* @kind spacing */\n  --sp-fl-xl:  clamp(24px, 3vw + 12px,   48px); /* @kind spacing */\n  --sp-fl-2xl: clamp(32px, 4vw + 16px,   72px); /* @kind spacing */\n  --sp-fl-3xl: clamp(40px, 6vw + 20px,   112px); /* @kind spacing */\n\n  /* Section padding recipes — use on <section> wrappers */\n  --section-x: clamp(16px, 5vw, 80px); /* @kind spacing */       /* horizontal page gutter */\n  --section-y: clamp(48px, 7vw, 120px); /* @kind spacing */      /* vertical section rhythm */\n  --container-max: 1280px; /* @kind spacing */                   /* max content width */\n\n  /* ── Safe-area insets (iOS notch / home indicator / Android nav) ── */\n  --safe-top:    env(safe-area-inset-top, 0px); /* @kind spacing */\n  --safe-right:  env(safe-area-inset-right, 0px); /* @kind spacing */\n  --safe-bottom: env(safe-area-inset-bottom, 0px); /* @kind spacing */\n  --safe-left:   env(safe-area-inset-left, 0px); /* @kind spacing */\n\n  /* ── Radius ── */\n  --r-sm:   6px;\n  --r-md:   8px;\n  --r-lg:   12px;\n  --r-xl:   16px;\n  --r-2xl:  24px;\n  --r-full: 999px;\n\n  /* ── Shadows ── */\n  --shadow-sm:  0 1px 2px rgba(25,25,36,.04);\n  --shadow-md:  0 4px 12px rgba(25,25,36,.06);\n  --shadow-lg:  0 10px 32px rgba(25,25,36,.08);\n  --shadow-xl:  0 20px 50px rgba(25,25,36,.10);\n  --shadow-2xl: 0 30px 80px rgba(25,25,36,.14);\n  --shadow-focus: 0 0 0 4px rgba(200,182,255,.20);\n\n  /* ── Motion ── */\n  --ease-out:  cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n  --ease-snap: cubic-bezier(0.34, 1.56, 0.64, 1); /* @kind other */\n  --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --dur-fast: 150ms; /* @kind other */\n  --dur-med:  250ms; /* @kind other */\n  --dur-slow: 400ms; /* @kind other */\n}\n\n/* ═══════════════════════════════════════════════════════════════\n   SEMANTIC TYPOGRAPHY — drop-in element styles\n   ═══════════════════════════════════════════════════════════════ */\n\nbody {\n  font-family: var(--font-body);\n  font-size: var(--text-base);\n  line-height: 1.65;\n  color: var(--fg);\n  background: var(--bg);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n\n/* ── TYPE SYSTEM v4.0 · Semantic typography ────────────────────────────\n   H1 / .hero-text = Chubbo (display) at hero scale. Italic for emphasis\n     (native italic, coloured --plum).\n   H2–H4 = Chubbo — section headings. No forced uppercase; weight carries.\n   Body / p / .lead = Supreme — the reading layer.\n   UI chrome (buttons, nav, inputs) = Satoshi via --font-ui.\n   .eyebrow / .label / .data-value = JetBrains Mono — labels + data.\n   ──────────────────────────────────────────────────────────────────── */\n\n/* Hero / editorial display — Chubbo */\nh1, .h1, .hero-text {\n  font-family: var(--font-serif);\n  font-weight: 700;           /* Chubbo display — weight carries the authority */\n  font-size: clamp(40px, 6.5vw, var(--text-4xl));\n  line-height: 0.96;\n  letter-spacing: -0.02em;\n  color: var(--ink);\n}\nh1 em, .h1 em, .hero-text em {\n  font-style: italic;\n  color: var(--plum);         /* Chubbo has native italic — no swap needed */\n  letter-spacing: -0.03em;\n}\n\n/* Section headings — Chubbo */\nh2, .h2 {\n  font-family: var(--font-display);\n  font-weight: 800;\n  font-size: clamp(28px, 4.5vw, var(--text-3xl));\n  line-height: 1.05;\n  letter-spacing: -0.03em;\n  color: var(--ink);\n}\nh3, .h3 {\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: var(--text-xl);\n  line-height: 1.1;\n  letter-spacing: -0.02em;\n}\nh4, .h4 {\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: var(--text-md);\n  line-height: 1.3;\n  letter-spacing: -0.01em;\n}\n\n/* Italic accent on display headings → falls to body italic */\nh2 em, h3 em, h4 em, .display em {\n  font-family: var(--font-body);\n  font-style: italic;\n  font-weight: inherit;\n  letter-spacing: 0;\n  color: var(--plum);\n}\nem, .italic { font-style: italic; color: var(--plum); }\n\np, .body {\n  font-family: var(--font-body);\n  font-size: var(--text-base);\n  line-height: 1.75;\n  color: var(--fg-muted);\n}\n\n.lead {\n  font-size: var(--text-md);\n  line-height: 1.8;\n  color: var(--fg-muted);\n}\n\nsmall, .caption {\n  font-size: var(--text-sm);\n  color: var(--fg-subtle);\n}\n\n/* Mono labels / eyebrows / tags */\n.mono, code, kbd, pre {\n  font-family: var(--font-mono);\n}\n/* Eyebrow / section labels — JetBrains Mono */\n.eyebrow, .label-mono {\n  font-family: var(--font-label);\n  font-size: var(--text-xs);\n  letter-spacing: 3px;\n  text-transform: uppercase;\n  color: var(--stone-500);\n}\n/* Data values — JetBrains Mono */\n.data-value {\n  font-family: var(--font-mono);\n  font-weight: 700;\n  letter-spacing: -0.02em;\n  font-variant-numeric: tabular-nums;\n}\n/* Fluid heading utilities (Chubbo display) */\n.h1-fluid {\n  font-family: var(--font-serif);\n  font-weight: 400;\n  font-size: var(--fl-4xl);\n  line-height: 0.96;\n  letter-spacing: -0.025em;\n}\n.h2-fluid {\n  font-family: var(--font-display);\n  font-weight: 800;\n  font-size: var(--fl-3xl);\n  line-height: 1.05;\n  letter-spacing: -0.03em;\n}\n\n::selection { background: var(--lavender); color: var(--ink); }\n*:focus-visible { outline: 2px solid var(--lavender); outline-offset: 2px; }\n\n/* ═══════════════════════════════════════════════════════════════\n   MOBILE UTILITIES — responsive helpers\n   ═══════════════════════════════════════════════════════════════ */\n\n/* Page container — handles gutter + max width + safe-area */\n.container {\n  width: 100%;\n  max-width: var(--container-max);\n  margin: 0 auto;\n  padding-left: max(var(--section-x), var(--safe-left));\n  padding-right: max(var(--section-x), var(--safe-right));\n  box-sizing: border-box;\n}\n.section { padding-top: var(--section-y); padding-bottom: var(--section-y); }\n\n/* Touch-target enforcement */\n.tap    { min-height: var(--touch-min);     min-width: var(--touch-min);     }\n.tap-lg { min-height: var(--touch-comfort); min-width: var(--touch-comfort); }\n\n/* Safe-area helpers — bottom tab bars, modal sheets, etc. */\n.pb-safe { padding-bottom: calc(var(--sp-4) + var(--safe-bottom)); }\n.pt-safe { padding-top:    calc(var(--sp-4) + var(--safe-top)); }\n\n/* Show/hide by breakpoint */\n.mobile-only  { display: block; }\n.desktop-only { display: none;  }\n@media (min-width: 768px) {\n  .mobile-only  { display: none;  }\n  .desktop-only { display: block; }\n}\n\n/* Responsive hero + body — mobile defaults, desktop overrides */\n.h1-fluid { font-family: var(--font-display); font-weight: 700;\n  font-size: var(--fl-4xl); line-height: 1.02; letter-spacing: -0.015em; }\n.h2-fluid { font-family: var(--font-display); font-weight: 600;\n  font-size: var(--fl-3xl); line-height: 1.08; letter-spacing: -0.005em; }\n.body-fluid { font-size: var(--fl-base); line-height: 1.6; }\n\n/* Stack on mobile, row on desktop */\n.stack-to-row { display: flex; flex-direction: column; gap: var(-
